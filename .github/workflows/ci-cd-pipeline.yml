name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: '0 3 * * *'      # nightly full security scan at 03:00 UTC (runs unattended)
  workflow_dispatch:         # manual "Run workflow" button, for on-demand scans / demos

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run tests
      run: mvn test
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        APP_API_KEY: ${{ secrets.APP_API_KEY }}

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-proxy-devops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-proxy-devops:${{ github.sha }}

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"



  security-scan:
    runs-on: ubuntu-latest
    # Never blocks a commit: this job runs ONLY on the nightly schedule or a manual
    # dispatch -- never on push or pull_request. So no branch ever waits on the NVD
    # download during normal development.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore NVD cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-

      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Save NVD cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
